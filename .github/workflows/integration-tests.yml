name: Integration tests
permissions:
  contents: none

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  integration-tests:
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    needs: []   # add build-toolchain / build-runtimes once those jobs exist in the same workflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up build environment
        run: |
          sudo bash scripts/setup-env.sh
          echo "CMAKE_BIN=/usr/local/bin/cmake" >> "$GITHUB_ENV"

      - name: Determine version
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            version=$(cat VERSION)
          else
            version=${{ github.head_ref }}
          fi
          echo "version=$version" >> "$GITHUB_ENV"

      - name: Download runtime library
        run: |
          mkdir -p runtime-library/build
          wget -q "https://oaax.nbg1.your-objectstorage.com/runtimes/${{ env.version }}/CPU/x86_64/Ubuntu/library.tar.gz" -O /tmp/library.tar.gz  # nosec: public artifact storage
          tar xzf /tmp/library.tar.gz -C runtime-library/build/

      - name: Load toolchain Docker image
        run: |
          wget -q "https://oaax.nbg1.your-objectstorage.com/conversion-toolchain/${{ env.version }}/CPU/oaax-cpu-toolchain.tar" -O /tmp/toolchain.tar  # nosec: public artifact storage
          docker load -i /tmp/toolchain.tar
          rm /tmp/toolchain.tar

      - name: Set up Python environment
        run: |
          pip install uv
          uv sync --extra integration -q

      - name: Stage 1 — simplify models and run toolchain tests
        run: uv run python tests/stage1.py

      - name: Upload simplified models
        uses: actions/upload-artifact@v4
        with:
          name: simplified-models
          path: tests/test_models/simplified/
          retention-days: 1

      - name: Stage 2 — build runtime tests and benchmark
        run: uv run python tests/stage2.py --runs 100 --csv results-linux.csv

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-linux
          path: results-linux.csv
          if-no-files-found: warn

      - name: Upload runtime log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-log-linux
          path: tests/runtime/build/runtime.log
          if-no-files-found: warn

  integration-tests-windows:
    timeout-minutes: 30
    runs-on: windows-latest
    needs: [integration-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Determine version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -eq "refs/heads/main") {
            $version = Get-Content VERSION
          } else {
            $version = "${{ github.head_ref }}"
          }
          echo "version=$version" >> $env:GITHUB_ENV

      - name: Download Windows runtime library
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path runtime-library\build\Release | Out-Null
          Invoke-WebRequest -Uri "https://oaax.nbg1.your-objectstorage.com/runtimes/${{ env.version }}/CPU/x86_64/Windows/library.tar.gz" -OutFile library.tar.gz  # nosec: public artifact storage
          tar xzf library.tar.gz -C runtime-library\build\Release\
          Remove-Item library.tar.gz

      - name: Download simplified models
        uses: actions/download-artifact@v4
        with:
          name: simplified-models
          path: tests/test_models/simplified

      - name: Set up Python environment
        run: |
          pip install uv
          uv sync --extra integration -q

      - name: Stage 2 — build runtime tests and benchmark
        run: uv run python tests/stage2.py --runs 100 --csv results-windows.csv

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-windows
          path: results-windows.csv
          if-no-files-found: warn

      - name: Upload runtime log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-log-windows
          path: tests/runtime/build/Release/runtime.log
          if-no-files-found: warn
