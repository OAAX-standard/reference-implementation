# Skip generated / vendored directories for all hooks.
exclude: ^(runtime-library/deps/|\.venv/|conversion-toolchain/\.venv/)

default_language_version:
  python: python3.11

repos:
  # ── General file hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'          # preserve intentional trailing spaces in Markdown
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]

  # ── Python: ruff (lint + format) ─────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff          # lint, with auto-fix
        args: [--fix]
      - id: ruff-format   # format (black-compatible)

  # ── C / C++: clang-format ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.0
    hooks:
      - id: clang-format
        types_or: [c, c++]

  # ── Shell: shellcheck ────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ── Dockerfile: hadolint ─────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker

  # ── Secret scanning ──────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-secrets
        name: check for secrets and confidential info
        language: script
        entry: scripts/check-secrets.sh
        args: [--staged]
        pass_filenames: false
